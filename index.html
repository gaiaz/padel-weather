<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var setH = function() {
          var inner = window.innerHeight;
          var v = window.visualViewport;
          var vh = (v && v.height) ? v.height : inner;
          var screenH = window.screen.availHeight || window.screen.height || inner;
          var h = Math.max(inner, vh, screenH, 100);
          document.documentElement.style.setProperty('--app-height', h + 'px');
        };
        setH();
        window.addEventListener('resize', setH);
        window.addEventListener('orientationchange', function() { setTimeout(setH, 200); });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setH);
          window.visualViewport.addEventListener('scroll', setH);
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="/icon.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PadelWeather</title>
    <meta name="theme-color" content="#2121B9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
