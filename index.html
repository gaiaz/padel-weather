<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var setH = function() {
          var v = window.visualViewport;
          var h = (v && v.height) ? Math.max(window.innerHeight, v.height) : window.innerHeight;
          document.documentElement.style.setProperty('--app-height', (h || 100) + 'px');
        };
        setH();
        window.addEventListener('resize', setH);
        if (window.visualViewport) window.visualViewport.addEventListener('resize', setH);
      })();
    </script>
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PadelWeather</title>
    <meta name="theme-color" content="#0041af" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
